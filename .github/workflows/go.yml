name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'true'

    - name: Fetch protoc
      run: |
        source tools/fetch-protoc.sh
        echo "$HOME/local/bin" >> "$GITHUB_PATH"

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25.6'

    - name: Build
      run: make

    - name: Test
      run: make test
